# Render.com blueprint.
#
# Free tier configuration. NOTE: free plan does NOT support persistent disks,
# so SQLite lives on ephemeral storage that resets on every deploy/restart.
# Fine for a demo (the seed scripts re-populate templates, LA clients, and
# demo schools on boot) but published customisations won't survive a restart.
# Upgrade to "starter" plan ($7/mo) and add a disk block to keep state.

services:
  - type: web
    name: fsm-leaflet
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        # /tmp is writable on Render free tier (ephemeral).
        value: /tmp/fsm.db
      - key: PUBLIC_BASE_URL
        # Render injects RENDER_EXTERNAL_URL at runtime; the server will read
        # this if PUBLIC_BASE_URL is unset. Override in the Render dashboard
        # once you've picked a custom domain.
        sync: false
      - key: PLATFORM_ADMIN_EMAILS
        value: phil@entitledto.co.uk
      - key: ADMIN_PASSWORD
        # Override in the Render dashboard if you want to rotate. Sync false
        # so re-applying the blueprint doesn't trample a manual change.
        sync: false
      - key: EMAIL_PROVIDER
        value: none
      - key: ANTHROPIC_API_KEY
        # Set this in the Render dashboard (Environment → Add Environment Variable).
        # Don't paste secrets here — sync: false keeps Render from prompting on each deploy.
        sync: false
