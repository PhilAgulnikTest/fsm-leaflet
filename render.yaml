# Render.com blueprint.
#
# Starter plan ($7/mo) with a 1 GB persistent disk mounted at /data so
# SQLite survives deploys and restarts. Published customisations now stick.
#
# To downgrade back to free tier for cost reasons: change plan to "free",
# delete the disk block, and flip DATABASE_PATH back to /tmp/fsm.db.

services:
  - type: web
    name: fsm-leaflet
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: fsm-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        # Lives on the persistent disk above so customisations survive deploys.
        value: /data/fsm.db
      - key: PUBLIC_BASE_URL
        # Render injects RENDER_EXTERNAL_URL at runtime; the server will read
        # this if PUBLIC_BASE_URL is unset. Override in the Render dashboard
        # once you've picked a custom domain.
        sync: false
      - key: PLATFORM_ADMIN_EMAILS
        value: phil@entitledto.co.uk
      - key: ADMIN_PASSWORD
        # Override in the Render dashboard if you want to rotate. Sync false
        # so re-applying the blueprint doesn't trample a manual change.
        sync: false
      - key: EMAIL_PROVIDER
        value: none
      - key: ANTHROPIC_API_KEY
        # Set this in the Render dashboard (Environment → Add Environment Variable).
        # Don't paste secrets here — sync: false keeps Render from prompting on each deploy.
        sync: false
