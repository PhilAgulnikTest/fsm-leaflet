<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" role="img" aria-label="entitledto — independent, accurate, reliable">
  <g font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <!-- Wordmark: bright blue 'entitled' + dark navy 'to' -->
    <text x="2" y="32" font-weight="900" font-size="34" letter-spacing="-1.4" fill="#1F76EC">entitled<tspan fill="#0E1B3D">to</tspan></text>
    <!-- Tagline -->
    <text x="3" y="50" font-weight="500" font-size="10.5" letter-spacing="0.1" fill="#0E1B3D">independent | accurate | reliable</text>
  </g>
</svg>
